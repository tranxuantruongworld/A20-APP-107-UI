<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience Q&A Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b1f2a;
      --bg-mid: #10384d;
      --bg-soft: #d7f5ec;
      --card: rgba(255, 255, 255, 0.86);
      --ink: #12212a;
      --muted: #3b5563;
      --accent: #ff6b35;
      --accent-2: #00a6a6;
      --ok: #1d9f4a;
      --warn: #a86e00;
      --err: #c5382f;
      --ring: rgba(0, 166, 166, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 107, 53, 0.25), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(0, 166, 166, 0.25), transparent 32%),
        linear-gradient(130deg, var(--bg-deep), var(--bg-mid) 48%, #0f5f6f);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(100%, 1050px);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      animation: rise 0.6s ease-out;
    }

    @keyframes rise {
      from {
        transform: translateY(16px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .header {
      padding: 24px;
      color: #f3fcff;
      background:
        linear-gradient(95deg, rgba(11, 31, 42, 0.92), rgba(16, 56, 77, 0.88)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.06) 0 8px, transparent 8px 16px);
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.95rem;
      color: rgba(243, 252, 255, 0.85);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .panel {
      padding: 24px;
    }

    .panel + .panel {
      border-left: 1px solid rgba(0, 0, 0, 0.08);
    }

    .h2 {
      margin: 0 0 14px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #21455a;
    }

    .field-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(17, 42, 55, 0.2);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.95);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px var(--ring);
    }

    textarea {
      min-height: 128px;
      resize: vertical;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #204759;
      color: #fff;
    }

    .btn-ghost {
      background: rgba(0, 0, 0, 0.06);
      color: #173847;
    }

    .recording-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #a7b3b8;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
      transition: background-color 0.18s ease, box-shadow 0.18s ease;
    }

    .recording-dot.live {
      background: #ee3d2f;
      box-shadow: 0 0 0 5px rgba(238, 61, 47, 0.2);
      animation: pulse 0.9s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 3px rgba(238, 61, 47, 0.18); }
      70% { box-shadow: 0 0 0 10px rgba(238, 61, 47, 0); }
      100% { box-shadow: 0 0 0 3px rgba(238, 61, 47, 0); }
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.92rem;
      background: rgba(32, 71, 89, 0.08);
      color: #204759;
    }

    .status.ok { background: rgba(29, 159, 74, 0.14); color: var(--ok); }
    .status.warn { background: rgba(168, 110, 0, 0.14); color: var(--warn); }
    .status.err { background: rgba(197, 56, 47, 0.14); color: var(--err); }

    .list {
      margin: 16px 0 0;
      max-height: 260px;
      overflow: auto;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      background: #fff;
      padding: 6px;
    }

    .item {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(0, 0, 0, 0.02);
      margin: 6px 0;
    }

    .meta {
      margin: 0 0 4px;
      font-size: 0.78rem;
      color: #537080;
    }

    .content {
      margin: 0;
      font-size: 0.95rem;
      color: #142833;
      line-height: 1.45;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .panel + .panel { border-left: 0; border-top: 1px solid rgba(0, 0, 0, 0.08); }
      .field-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <h1 class="title">Audience Q&A Capture</h1>
      <p class="subtitle">Khán giả có thể gửi câu hỏi bằng text hoặc thu âm từ micro trên web/app, backend sẽ lưu thống nhất theo phòng.</p>
    </header>

    <main class="main">
      <section class="panel">
        <h2 class="h2">Thông tin phiên hỏi đáp</h2>
        <div class="field-grid">
          <div>
            <label for="roomId">Room ID</label>
            <input id="roomId" type="text" placeholder="VD: hall_a" />
          </div>
          <div>
            <label for="speakerName">Tên khán giả</label>
            <input id="speakerName" type="text" placeholder="VD: Minh Anh" />
          </div>
        </div>

        <h2 class="h2">Gửi câu hỏi bằng text</h2>
        <label for="questionText">Nội dung</label>
        <textarea id="questionText" placeholder="Nhập câu hỏi muốn gửi cho diễn giả..."></textarea>
        <div class="row">
          <button class="btn-accent" id="sendTextBtn">Gửi text</button>
        </div>

        <h2 class="h2" style="margin-top: 22px;">Gửi câu hỏi bằng voice</h2>
        <p style="margin: 0; color: var(--muted); font-size: 0.9rem;">
          <span id="recordDot" class="recording-dot"></span><span id="recordLabel">Chưa ghi âm</span>
        </p>
        <div class="row">
          <button class="btn-secondary" id="startRecordBtn">Bắt đầu ghi âm</button>
          <button class="btn-ghost" id="stopRecordBtn" disabled>Dừng ghi âm</button>
          <button class="btn-accent" id="sendVoiceBtn" disabled>Gửi voice</button>
        </div>
        <audio id="previewAudio" controls style="width: 100%; margin-top: 12px; display: none;"></audio>

        <div id="statusBox" class="status">Sẵn sàng nhận câu hỏi.</div>
      </section>

      <section class="panel">
        <h2 class="h2">Danh sách câu hỏi đã ghi nhận</h2>
        <div class="row" style="margin-top: 0;">
          <button class="btn-ghost" id="refreshBtn">Tải lại danh sách</button>
        </div>
        <div id="questionList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
